# =============================================================================
# Market Display Configuration
# =============================================================================
# All user-tunable settings live here. The Python code reads this on startup
# and on SIGHUP (or on the configured reload interval).
#
# Symbols: each instrument has a `symbols` block keyed by provider, so the
# same logical instrument can have different tickers per data vendor.
# =============================================================================

display:
  # "auto" detects the screen size at startup. Override with "1920x1080" or
  # "3840x2160" if you want to force a size (useful for windowed testing).
  resolution: auto

  # Fullscreen kiosk mode. Set false during development to get a normal window.
  fullscreen: true

  # Hide the OS mouse cursor (wall-display mode).
  hide_cursor: true

  # Base font size in points at 1080p. Scales linearly with resolution height
  # (so on 4K, fonts double automatically). Tweak this if text is too small/big.
  base_font_pt: 14

  # Background color of the whole window.
  background: "#0A0E1A"

# -----------------------------------------------------------------------------
# Colors used by charts and tiles
# -----------------------------------------------------------------------------
colors:
  up: "#00D964"             # bright green for gains
  up_fill: "#00D96433"      # translucent green for area under line
  down: "#FF3B3B"           # red for losses
  down_fill: "#FF3B3B33"
  neutral: "#888888"
  banner_bg: "#1A1F2E"      # banner strip at top of each chart
  banner_text: "#FFFFFF"
  axis: "#3A4255"           # axis tick labels
  grid: "#1F2533"           # subtle grid lines
  prev_close_line: "#FFB800" # amber dashed line at previous day's close
  tile_bg: "#141A26"
  tile_border: "#252C3E"
  closed_badge_bg: "#FF8A00"
  closed_badge_text: "#0A0E1A"

# -----------------------------------------------------------------------------
# Layout: how the screen is divided
# -----------------------------------------------------------------------------
layout:
  # Fraction of vertical space given to the chart row (top).
  # The bottom ticker takes the remainder.
  charts_height_fraction: 0.62

  # Padding inside the window (in pixels at 1080p; scales with resolution).
  outer_padding: 24
  chart_gap: 16
  tile_gap: 10

  # Bottom ticker grid: number of columns. Rows are computed from the
  # number of instruments under `tiles.symbols`.
  tile_columns: 4

# -----------------------------------------------------------------------------
# Update / refresh behavior
# -----------------------------------------------------------------------------
refresh:
  chart_seconds: 60         # how often charts refresh
  tile_seconds: 60          # how often bottom tiles refresh
  config_reload_seconds: 300 # re-read this YAML every N seconds (0 = never)

# -----------------------------------------------------------------------------
# Region schedule (all times Pacific). Each region declares which chart set
# and which tile set is "primary" during its window.
#
# Times are 24-hour HH:MM in America/Los_Angeles. The day wraps at midnight.
# -----------------------------------------------------------------------------
schedule:
  timezone: "America/Los_Angeles"
  windows:
    - name: north_america
      start: "06:30"
      end:   "17:00"
      chart_set: north_america
      tile_set: north_america

    - name: asia
      start: "17:00"
      end:   "01:00"
      chart_set: asia
      tile_set: asia

    - name: europe
      start: "01:00"
      end:   "06:30"
      chart_set: europe
      tile_set: europe

# | Country   | Main exchange   | Local trading hours                 | Pacific Time                                     | Trading hours  |
# |-----------|-----------------|-------------------------------------|--------------------------------------------------|----------------|
# | US        | NYSE/Nasdaq     | 9:30 AM–4:00 PM                     | 6:30 AM–1:00 PM                                  | 6.5            |
# | Canada    | TSX             | 9:30 AM–4:00 PM                     | 6:30 AM–1:00 PM                                  | 6.5            |
# | Mexico    | BMV             | 8:30 AM–3:00 PM                     | 7:30 AM–2:00 PM                                  | 6.5            |
# | Japan     | Tokyo/JPX       | 9:00–11:30 AM, 12:30–3:30 PM        | 5:00–7:30 PM, 8:30–11:30 PM previous day         | 5.5            |
# | Hong Kong | HKEX            | 9:30 AM–12:00 PM, 1:00–4:00 PM      | 6:30–9:00 PM, 10:00 PM–1:00 AM previous day      | 5.5            |
# | S. Korea  | KRX             | 9:00 AM–3:30 PM                     | 5:00–11:30 PM previous day                       | 6.5            |
# | China     | Shanghai/SSE    | 9:30–11:30 AM, 1:00–3:00 PM         | 6:30–8:30 PM, 10:00 PM–12:00 AM previous day     | 4.0            |
# | UK        | LSE             | 8:00 AM–4:30 PM                     | 12:00–8:30 AM                                    | 8.5            |
# | France    | Euronext Paris  | 9:00 AM–5:30 PM                     | 12:00–8:30 AM                                    | 8.5            |
# | Germany   | Xetra           | 9:00 AM–5:30 PM                     | 12:00–8:30 AM                                    | 8.5            |
# | Italy     | Borsa Italiana  | 9:00 AM–5:30 PM                     | 12:00–8:30 AM                                    | 8.5            |
# | Australia | ASX             | 10:00 AM–4:00 PM                    | 5:00–11:00 PM previous day                       | 6.0            |

# -----------------------------------------------------------------------------
# Markets: name -> { timezone, sessions: [...] }
#
# Each chart instrument can reference one of these by name (via its `market:`
# key). The chart then positions its line along an x-axis representing that
# market's full trading day (from open of first session to close of last
# session). Lunch breaks render as flat segments — the chart treats the
# gross window as one block.
#
# When the market is closed (weekend, holiday, after-hours, pre-market), the
# chart shows the most recent session that has data, filling the chart, and
# a "CLOSED" badge appears in the chart's banner.
#
# Sessions are in the market's local time (HH:MM, 24-hour).
# -----------------------------------------------------------------------------
markets:
  US:
    timezone: "America/New_York"
    sessions:
      - { open: "09:30", close: "16:00" }

  CA:
    timezone: "America/Toronto"
    sessions:
      - { open: "09:30", close: "16:00" }

  MX:
    timezone: "America/Mexico_City"
    sessions:
      - { open: "08:30", close: "15:00" }

  JP:
    timezone: "Asia/Tokyo"
    sessions:
      - { open: "09:00", close: "11:30" }
      - { open: "12:30", close: "15:30" }

  HK:
    timezone: "Asia/Hong_Kong"
    sessions:
      - { open: "09:30", close: "12:00" }
      - { open: "13:00", close: "16:00" }

  KR:
    timezone: "Asia/Seoul"
    sessions:
      - { open: "09:00", close: "15:30" }

  CN:
    timezone: "Asia/Shanghai"
    sessions:
      - { open: "09:30", close: "11:30" }
      - { open: "13:00", close: "15:00" }

  UK:
    timezone: "Europe/London"
    sessions:
      - { open: "08:00", close: "16:30" }

  DE:
    timezone: "Europe/Berlin"
    sessions:
      - { open: "09:00", close: "17:30" }

  FR:
    timezone: "Europe/Paris"
    sessions:
      - { open: "09:00", close: "17:30" }

  IT:
    timezone: "Europe/Rome"
    sessions:
      - { open: "09:00", close: "17:30" }

  AU:
    timezone: "Australia/Sydney"
    sessions:
      - { open: "10:00", close: "16:00" }

# -----------------------------------------------------------------------------
# Data providers. The first provider in `order` that successfully returns
# data wins. Per-instrument overrides live in the instrument's `provider` key.
# -----------------------------------------------------------------------------
providers:
  order: [yfinance, eodhd]

  yfinance:
    enabled: true
    # yfinance has no API key. Intraday quote freshness is ~15 min delayed
    # for most US indices. Plenty for a wall display.

  eodhd:
    enabled: true
    # API key comes from env var EODHD_API_KEY (or .env file). Do NOT put it here.
    base_url: "https://eodhistoricaldata.com/api"
    # The "All World" subscription is end-of-day; we use it primarily for the
    # previous-day close on charts and for static tile pricing.

# -----------------------------------------------------------------------------
# CHARTS: three top-row charts per region. List exactly 3 per chart_set.
#
# Each entry:
#   name:        Long display name shown in the banner
#   short:       Short label (4 chars max ideal) sometimes used in compact UI
#   market:      Name from the `markets:` block above. Drives x-axis position
#                (fills as the trading day progresses) and the CLOSED badge.
#                Omit to fall back to legacy fill-the-chart behavior.
#   provider:    (optional) force a specific provider for this instrument
#   symbols:     ticker per provider — code uses whichever provider is active
# -----------------------------------------------------------------------------
charts:
  north_america:
    - name: "S&P 500"
      short: "SPX"
      market: US
      symbols: { yfinance: "^GSPC", eodhd: "GSPC.INDX" }

    - name: "NASDAQ"
      short: "IXIC"
      market: US
      symbols: { yfinance: "^IXIC", eodhd: "IXIC.INDX" }

    - name: "RUSSELL 1000"
      short: "RUI"
      market: US
      symbols: { yfinance: "^RUI", eodhd: "RUI.INDX" }

  asia:
    - name: "NIKKEI 225"
      short: "N225"
      market: JP
      symbols: { yfinance: "^N225", eodhd: "N225.INDX" }

    - name: "HANG SENG"
      short: "HSI"
      market: HK
      symbols: { yfinance: "^HSI",  eodhd: "HSI.INDX" }

    - name: "SHANGHAI COMPOSITE"
      short: "SSEC"
      market: CN
      symbols: { yfinance: "000001.SS", eodhd: "000001.SHG" }

  europe:
    - name: "FTSE 100"
      short: "UKX"
      market: UK
      symbols: { yfinance: "^FTSE", eodhd: "FTSE.INDX" }

    - name: "DAX"
      short: "DAX"
      market: DE
      symbols: { yfinance: "^GDAXI", eodhd: "GDAXI.INDX" }

    - name: "EURO TECH"
      short: "SX8P"
      market: DE
      symbols: { yfinance: "^SX8P", eodhd: "SX8P.INDX" }

# -----------------------------------------------------------------------------
# TILES: bottom-row tiles per region. Each tile is the CNBC-style banner
# (name, price, change, % change) without the chart.
#
# `decimals`: how many decimal places to show (treasuries often want 3).
# `unit`: optional suffix on the price (e.g., "%" for yields).
# -----------------------------------------------------------------------------
tiles:
  north_america:
    - { name: "NASDAQ 100",  symbols: { yfinance: "^NDX",  eodhd: "NDX.INDX"  }, decimals: 2 }
    - { name: "AMZN", symbols: { yfinance: "AMZN", eodhd: "AMZN.US" }, decimals: 2 }
    - { name: "GOOG", symbols: { yfinance: "GOOG", eodhd: "GOOG.US" }, decimals: 2 }
    - { name: "BRK-B",  symbols: { yfinance: "BRK-B",  eodhd: "BRK-B.US"  }, decimals: 2 }
    - { name: "13W T-BILL",  symbols: { yfinance: "^IRX" },  decimals: 3, unit: "%" }
    - { name: "5Y TREAS",  symbols: { yfinance: "^FVX" },  decimals: 3, unit: "%" }
    - { name: "10Y TREAS", symbols: { yfinance: "^TNX" },  decimals: 3, unit: "%" }
    - { name: "30Y TREAS", symbols: { yfinance: "^TYX" },  decimals: 3, unit: "%" }

  asia:
    - { name: "MARUBENI",  symbols: { yfinance: "8002.T" }, decimals: 0 }
    - { name: "MITSUBISHI", symbols: { yfinance: "8058.T" }, decimals: 0 }
    - { name: "YASKAWA",   symbols: { yfinance: "6506.T" }, decimals: 0 }
    - { name: "FANUC",     symbols: { yfinance: "6954.T" }, decimals: 0 }
    - { name: "USD/JPY",   symbols: { yfinance: "JPY=X" }, decimals: 2 }
    - { name: "GOLD",      symbols: { yfinance: "GC=F"  }, decimals: 2 }
    - { name: "ALIBABA",   symbols: { yfinance: "9988.HK", eodhd: "9988.HK" }, decimals: 2 }
    - { name: "BAIDU",     symbols: { yfinance: "9888.HK", eodhd: "9888.HK" }, decimals: 2 }

  europe:
    - { name: "GBP/USD",   symbols: { yfinance: "GBPUSD=X" }, decimals: 4 }
    - { name: "EUR/USD",   symbols: { yfinance: "EURUSD=X" }, decimals: 4 }
    - { name: "BRIT LAND", symbols: { yfinance: "BLND.L",  eodhd: "BLND.LSE"  }, decimals: 2 }
    - { name: "LAND SEC",  symbols: { yfinance: "LAND.L",  eodhd: "LAND.LSE"  }, decimals: 2 }
    - { name: "CAIXABANK", symbols: { yfinance: "CABK.MC", eodhd: "CABK.MC"   }, decimals: 2 }
    - { name: "MAPFRE",    symbols: { yfinance: "MAP.MC",  eodhd: "MAP.MC"    }, decimals: 2 }
    - { name: "NATURGY",   symbols: { yfinance: "NTGY.MC", eodhd: "NTGY.MC"   }, decimals: 2 }
    - { name: "ENGIE",     symbols: { yfinance: "ENGI.PA", eodhd: "ENGI.PA"   }, decimals: 2 }

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: INFO              # DEBUG | INFO | WARNING | ERROR
  file: "logs/markets_display.log"
  max_bytes: 5242880       # 5 MB
  backup_count: 3
